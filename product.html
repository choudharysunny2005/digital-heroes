<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Product details - Digital Heroes. Discover premium quality goods with secure ordering."
    />
    <title>Product Details | Digital Heroes</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      .product-detail-wrapper {
        max-width: 1100px;
        margin: 0 auto;
        padding: 30px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 50px;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.07);
      }
      body.dark-mode .product-detail-wrapper {
        background: #1e293b;
      }

      .pd-image-section img {
        width: 100%;
        height: 430px;
        object-fit: cover;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      }
      .pd-info-section {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .pd-category-tag {
        text-transform: uppercase;
        font-size: 0.78rem;
        color: var(--accent-color);
        font-weight: bold;
        letter-spacing: 2px;
        margin-bottom: 10px;
      }
      .pd-title {
        font-size: 2rem;
        margin-bottom: 12px;
        font-weight: 800;
        color: var(--secondary-color);
        line-height: 1.2;
      }
      body.dark-mode .pd-title {
        color: #f1f5f9;
      }
      .pd-rating {
        color: #f59e0b;
        font-size: 1rem;
        margin-bottom: 18px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .pd-desc {
        line-height: 1.7;
        color: var(--text-gray);
        margin-bottom: 25px;
        font-size: 0.95rem;
      }
      .pd-price-row {
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        flex-wrap: wrap;
      }
      .pd-big-price {
        font-size: 2.4rem;
        font-weight: bold;
        color: var(--accent-color);
      }
      .pd-old-price {
        text-decoration: line-through;
        color: var(--text-gray);
        font-size: 1.1rem;
      }
      .pd-discount {
        background: #fee2e2;
        color: #ef4444;
        padding: 4px 12px;
        border-radius: 20px;
        font-weight: 700;
        font-size: 0.88rem;
      }
      .pd-delivery-badge {
        margin-bottom: 25px;
        background: #f0fdf4;
        padding: 12px 16px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.88rem;
        font-weight: 600;
        color: #166534;
        border: 1px solid #bbf7d0;
      }
      .pd-btn {
        width: 100%;
        padding: 18px;
        font-size: 1.1rem;
        border: none;
        box-shadow: 0 10px 25px rgba(124, 58, 237, 0.25);
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .pd-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px rgba(124, 58, 237, 0.35);
      }
      .pd-loading {
        text-align: center;
        padding: 80px 20px;
      }
      .pd-loading .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #e2e8f0;
        border-top-color: var(--accent-color);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 20px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .breadcrumb {
        font-size: 0.85rem;
        color: var(--text-gray);
        margin-bottom: 25px;
      }
      .breadcrumb a {
        color: var(--accent-color);
        text-decoration: none;
      }
      @media (max-width: 768px) {
        .product-detail-wrapper {
          grid-template-columns: 1fr;
        }
        .pd-image-section img {
          height: 280px;
        }
      }
    </style>
  </head>
  <body>
    <header class="navbar" role="banner">
      <div class="logo"><a href="index.html">Digital Heroes</a></div>
      <div class="search-bar mega-search-bar" id="global-search-container">
        \n
        <select
          class="search-category-select"
          id="global-search-category"
          aria-label="Search Categories"
        >
          \n
          <option value="all">All</option>
          \n
          <option value="Tech & Electronics">Tech</option>
          \n
          <option value="Fashion & Lifestyle">Fashion</option>
          \n
          <option value="Home & Kitchen">Home</option>
          \n
          <option value="Automotive & Bikes">Auto</option>
          \n</select
        >\n
        <div class="search-input-wrapper">
          \n
          <input
            type="text"
            id="global-search-input"
            placeholder="Search for products, brands and more"
            aria-label="Search items"
            autocomplete="off"
          />\n
          <div
            id="search-suggestions-box"
            class="search-suggestions shadow-lg hidden"
          ></div>
          \n
        </div>
        \n
        <button
          id="global-search-btn"
          class="search-btn-mega"
          aria-label="Perform search"
        >
          \n <i class="fas fa-search"></i>\n</button
        >\n
      </div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="sell.html" class="nav-highlight">Sell With Us</a>
        <a href="about.html">About Us</a>
      </nav>
      <div class="nav-icons">
        <button
          onclick="toggleTheme()"
          class="theme-toggle-btn"
          title="Toggle Dark Mode"
          aria-label="Toggle dark mode"
        >
          <i class="fas fa-moon"></i>
        </button>
        <a href="cart.html" aria-label="View Cart"
          ><i class="fas fa-shopping-cart"></i> Cart</a
        >
      </div>
    </header>

    <main class="main-pd-container">
      <div class="container">
        <div class="breadcrumb" id="breadcrumb">
          <a href="index.html">Home</a> &rsaquo;
          <a href="shop.html">Shop</a> &rsaquo; Loading...
        </div>
        <div id="product-target">
          <div class="pd-loading">
            <div class="spinner"></div>
            <p class="text-gray">Fetching product details...</p>
          </div>
        </div>
      </div>
    </main>

    <footer class="mega-footer">
      <div class="footer-bottom">
        <p>&copy; 2025 Digital Heroes. All Rights Reserved.</p>
      </div>
    </footer>

    <script src="script.js?v=1.0.2"></script>
    <script>
      const PROD_API = "/api";

      async function loadProductPage() {
        var urlParams = new URLSearchParams(window.location.search);
        var prodId = urlParams.get("id");
        var target = document.getElementById("product-target");
        var breadcrumb = document.getElementById("breadcrumb");

        var hasExplictId = true;
        // Guard: bad or missing ID in URL
        if (
          !prodId ||
          prodId === "undefined" ||
          prodId === "null" ||
          prodId.trim() === ""
        ) {
          console.warn(
            "Direct view detected. Will auto-select first available product.",
          );
          hasExplictId = false;
        }

        try {
          var products = [];

          // STEP 1: Read from sessionStorage cache (written by script.js when cards were rendered)
          // This guarantees IDs match exactly since it's the same data set
          try {
            var cached = sessionStorage.getItem("dh_products_cache");
            if (cached) {
              var parsed = JSON.parse(cached);
              if (parsed && parsed.length > 0) products = parsed;
            }
          } catch (e) {}

          // STEP 2: Fetch fresh from API if cache empty or stale
          if (products.length === 0) {
            var res = await fetch(PROD_API + "/products");
            if (!res.ok) throw new Error("Server error " + res.status);
            products = await res.json();

            // Apply same ID-fixup as script.js does
            products.forEach(function (p, i) {
              if (!p._id || p._id === "undefined" || p._id === "null") {
                p._id =
                  "local_" +
                  i +
                  "_" +
                  (p.name || "item").replace(/\s+/g, "").slice(0, 10);
              }
            });

            try {
              sessionStorage.setItem(
                "dh_products_cache",
                JSON.stringify(products),
              );
            } catch (e) {}
          }

          // STEP 3: Find by _id (Primary resolution pathway)
          var product = null;
          var normalizedTarget = String(prodId).toLowerCase().trim();

          for (var i = 0; i < products.length; i++) {
            var p = products[i];
            if (p._id && String(p._id).toLowerCase() === normalizedTarget) {
              product = p;
              break;
            }
          }

          // STEP 4: FALLBACK MATCHING (Critical failure prevention)
          // If no matching ID was found, verify if the query references an escaped name or slug
          if (!product) {
            var slugTarget = normalizedTarget.replace(/^alt_/, "");
            for (var j = 0; j < products.length; j++) {
              var candidate = products[j];
              if (candidate.name) {
                // Test 1: Compare canonical name slug
                var candidateSlug = encodeURIComponent(
                  candidate.name.replace(/\s+/g, "_"),
                ).toLowerCase();
                // Test 2: Compare explicit property
                var rawNameEscaped = encodeURIComponent(
                  candidate.name,
                ).toLowerCase();

                if (
                  slugTarget === candidateSlug ||
                  slugTarget === rawNameEscaped ||
                  normalizedTarget === candidateSlug
                ) {
                  product = candidate;
                  break;
                }
              }
            }
          }

          if (!product) {
            // Advanced cache purge and direct refresh check...
            sessionStorage.removeItem("dh_products_cache");
            var res2 = await fetch(PROD_API + "/products");
            var fresh = await res2.json();
            fresh.forEach(function (p, i) {
              if (!p._id || p._id === "undefined") {
                p._id =
                  "local_" +
                  i +
                  "_" +
                  (p.name || "item").replace(/\s+/g, "").slice(0, 10);
              }
            });
            try {
              sessionStorage.setItem(
                "dh_products_cache",
                JSON.stringify(fresh),
              );
            } catch (e) {}
            for (var j = 0; j < fresh.length; j++) {
              if (String(fresh[j]._id) === String(prodId)) {
                product = fresh[j];
                break;
              }
            }
          }

          // FINAL STEP: Fail-safe direct boot resolution
          if (!product && !hasExplictId && products.length > 0) {
            console.log(
              "Direct navigation fallback enabled - presenting spotlight product.",
            );
            product = products[0]; // Take the very first product found
          }

          if (!product) {
            showError(
              'Product not found. Please try again from the shop.<br><a href="shop.html" class="cta-button" style="display:inline-block; margin-top:20px;"><i class="fas fa-store"></i> Back to Shop</a>',
            );
            return;
          }

          // Sync allProducts so script.js addToCart function works
          if (typeof allProducts !== "undefined" && allProducts.length === 0) {
            products.forEach(function (p) {
              allProducts.push(p);
            });
          }

          renderProduct(product, target, breadcrumb);
        } catch (err) {
          console.error("Product load error:", err);
          showError(
            'Could not connect to the store server.<br><small>Make sure your Node.js server is running on port 8080.</small><br><a href="shop.html" class="cta-button" style="display:inline-block; margin-top:20px;"><i class="fas fa-store"></i> Back to Shop</a>',
          );
        }
      }

      function renderProduct(product, target, breadcrumb) {
        const oldPrice = product.originalPrice || product.price * 1.3;
        const discount = Math.max(
          0,
          Math.round(((oldPrice - product.price) / oldPrice) * 100),
        );
        const reviews = product.reviews || 120;
        const rating = product.rating || 4.5;
        const desc =
          "Experience the ultimate premium quality with this " +
          product.category +
          " marvel. Built using best-in-class materials and state-of-the-art craftsmanship. Digital Heroes provides free replacement & warranty support on this item.";

        document.title = product.name + " | Digital Heroes";
        breadcrumb.innerHTML =
          '<a href="index.html">Home</a> &rsaquo; <a href="shop.html">Shop</a> &rsaquo; <a href="shop.html?search=' +
          encodeURIComponent(product.category) +
          '">' +
          product.category +
          "</a> &rsaquo; " +
          product.name;

        target.innerHTML = [
          '<div class="product-detail-wrapper">',
          '  <div class="pd-image-section">',
          '    <img src="' +
            product.imageUrl +
            '" alt="' +
            product.name +
            '" onerror="this.src=\'https://picsum.photos/seed/fallback/600/600\'" loading="lazy">',
          "  </div>",
          '  <div class="pd-info-section">',
          '    <div class="pd-category-tag">' + product.category + "</div>",
          '    <h1 class="pd-title">' + product.name + "</h1>",
          '    <div class="pd-rating">',
          "      " + generateStars(rating),
          '      <span style="color:var(--text-gray); font-size:0.9rem; font-weight:normal;">&nbsp;' +
            rating.toFixed(1) +
            " / 5.0 &nbsp;(" +
            reviews +
            " Reviews)</span>",
          "    </div>",
          '    <p class="pd-desc">' + desc + "</p>",
          '    <div class="pd-price-row">',
          '      <span class="pd-big-price">$' +
            product.price.toFixed(2) +
            "</span>",
          '      <span class="pd-old-price">$' +
            oldPrice.toFixed(2) +
            "</span>",
          '      <span class="pd-discount">' + discount + "% OFF</span>",
          "    </div>",
          '    <div class="pd-delivery-badge">',
          '      <i class="fas fa-truck" style="color:#10b981;"></i>',
          '      Free Next-Day Delivery &nbsp;|&nbsp; <i class="fas fa-shield-alt" style="color:#10b981;"></i>&nbsp; 30-Day Returns',
          "    </div>",
          '    <button class="cta-button pd-btn" id="pd-add-btn" onclick="handleAddToCart(\'' +
            product._id +
            "')\">",
          '      <i class="fas fa-shopping-bag" style="margin-right:10px;"></i> Add to Cart &amp; Checkout',
          "    </button>",
          '    <a href="shop.html" style="display:block; text-align:center; margin-top:15px; color:var(--text-gray); font-size:0.9rem;">',
          '      <i class="fas fa-arrow-left"></i> Continue Shopping',
          "    </a>",
          "  </div>",
          "</div>",
        ].join("\n");
      }

      function handleAddToCart(productId) {
        var btn = document.getElementById("pd-add-btn");
        if (btn) {
          btn.disabled = true;
          btn.innerHTML =
            '<i class="fas fa-check"></i> Added! Taking you to cart...';
        }
        if (typeof addToCart === "function") {
          addToCart(productId);
        } else {
          var cart = JSON.parse(localStorage.getItem("dh_cart") || "[]");
          var existing = cart.find(function (i) {
            return i.productId === productId;
          });
          if (existing) existing.quantity += 1;
          else cart.push({ productId: productId, quantity: 1 });
          localStorage.setItem("dh_cart", JSON.stringify(cart));
          setTimeout(function () {
            window.location.href = "cart.html";
          }, 700);
        }
      }

      function generateStars(rating) {
        var html = "";
        var full = Math.floor(rating);
        var half = rating % 1 >= 0.5;
        for (var i = 0; i < full; i++) html += '<i class="fas fa-star"></i>';
        if (half) html += '<i class="fas fa-star-half-alt"></i>';
        return html;
      }

      function showError(html) {
        document.getElementById("product-target").innerHTML =
          '<div style="text-align:center; padding:80px 20px;">' +
          '<div style="font-size:3.5rem; margin-bottom:15px;">&#x1F615;</div>' +
          '<h2 style="margin-bottom:10px;">Oops!</h2>' +
          '<p style="color:var(--text-gray);">' +
          html +
          "</p>" +
          "</div>";
      }

      document.addEventListener("DOMContentLoaded", loadProductPage);
    </script>
  </body>
</html>
